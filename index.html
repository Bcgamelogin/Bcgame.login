<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BC Game Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <img src="https://bcgame.top/assets/logo/logo.png" alt="BC.GAME Logo" class="logo">
  <div class="container">
    <div class="header">
      <img src="https://bcgame.top/modules/account2/assets/bg_m-cac172cf.png" alt="Header Background" class="header-bg">
      <div class="header-content">
        <h1>Sign In</h1>
      </div>
    </div>

    <div class="form-section">
      <form id="login-form" class="login-form">
        <div class="input-group">
          <input id="email-phone" type="text" placeholder="Email / Phone Number" required>
        </div>
        <div class="input-group">
          <input id="password" type="password" placeholder="Password" required>
        </div>
        <a href="#" class="forgot-password">Forgot your password?</a>
        <button type="submit" class="submit-btn">Sign In</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
